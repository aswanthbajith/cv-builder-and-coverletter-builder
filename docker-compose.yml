version: '3.8'

services:
  job-automation:
    build: .
    container_name: job-automation
    volumes:
      - ./input:/app/input
      - ./profile:/app/profile
      - ./templates:/app/templates
      - ./generated:/app/generated
      - ./output:/app/output
      - ./config.yaml:/app/config.yaml
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    command: python src/main.py
