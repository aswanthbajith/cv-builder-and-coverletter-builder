version: '3.8'

services:
  job-automation:
    build: .
    container_name: job-automation
    volumes:
      - ./input:/app/input
      - ./profile:/app/profile
      - ./templates:/app/templates
      - ./generated:/app/generated
      - ./output:/app/output
      - ./config.yaml:/app/config.yaml
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      # Production logging: JSON for log shipping.
      - JOB_AUTO_LOGGING__FORMAT=json
      # Override any path or threshold without rebuilding the image.
      - JOB_AUTO_GENERATION__MAX_WORKERS=${JOB_AUTO_MAX_WORKERS:-4}
    command: job-automation
